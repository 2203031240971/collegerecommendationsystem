<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI College Advisor — EduMatch</title>
  <meta name="description" content="Chat with your personal AI college counselor — ask about colleges, courses, fees, and admissions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-mesh"></div>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <!-- ══ NAVBAR ════════════════════════════════════════════════════ -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand" aria-label="EduMatch Home">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        </div>
        <span class="brand-name">EduMatch</span>
        <span class="brand-badge">AI Advisor</span>
      </a>
      <div class="nav-actions">
        <a href="results.html" class="nav-btn ghost" aria-label="Back to results">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          My Results
        </a>
        <button class="nav-btn" id="clearBtn" onclick="clearChat()" aria-label="Start a new conversation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.41"/></svg>
          New Chat
        </button>
      </div>
    </div>
  </nav>

  <!-- ══ LAYOUT ═════════════════════════════════════════════════════ -->
  <div class="layout">

    <!-- ── SIDEBAR (profile + quick questions) ─────────────────────── -->
    <aside class="sidebar" id="sidebar" aria-label="Student profile and quick questions">

      <!-- Profile card -->
      <div class="profile-card" id="profileCard">
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar">S</div>
          <div>
            <p class="profile-label">Your Profile</p>
            <h2 class="profile-name" id="profileName">Student</h2>
          </div>
          <div class="online-dot" title="AI Advisor is online"></div>
        </div>
        <div class="profile-chips" id="profileChips">
          <!-- Injected by JS -->
        </div>
        <div class="model-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          Powered by Gemini AI
        </div>
      </div>

      <!-- Quick questions -->
      <div class="qs-section" id="qsSection">
        <p class="qs-title">💬 Ask me about</p>
        <div class="qs-list" id="qsList">
          <button class="qs-btn" onclick="sendQuick(this)">Which college should I apply to first?</button>
          <button class="qs-btn" onclick="sendQuick(this)">What are my chances at JNTU?</button>
          <button class="qs-btn" onclick="sendQuick(this)">Which course has the best placements?</button>
          <button class="qs-btn" onclick="sendQuick(this)">Tell me about EAMCET registration</button>
          <button class="qs-btn" onclick="sendQuick(this)">Government vs private — which is better?</button>
          <button class="qs-btn" onclick="sendQuick(this)">What documents do I need to apply?</button>
        </div>
      </div>

      <!-- Context info -->
      <div class="ctx-card">
        <p class="ctx-title">📚 Based on your matches</p>
        <div id="ctxColleges" class="ctx-list">
          <!-- Injected by JS -->
        </div>
      </div>

    </aside>

    <!-- ── CHAT AREA ────────────────────────────────────────────────── -->
    <main class="chat-area" role="main">

      <!-- Chat window -->
      <div class="chat-window" id="chatWindow" role="log" aria-label="Chat messages" aria-live="polite">
        <!-- Injected by JS -->
      </div>

      <!-- Typing indicator -->
      <div class="typing-wrap" id="typingWrap" style="display:none" aria-label="AI is typing">
        <div class="typing-bubble">
          <div class="typing-avatar">AI</div>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Input bar -->
      <div class="input-bar" role="form" aria-label="Message input">
        <textarea
          id="chatInput"
          class="chat-input"
          placeholder="Ask about colleges, courses, fees, EAMCET…"
          rows="1"
          maxlength="500"
          aria-label="Type your message"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button
          class="send-btn"
          id="sendBtn"
          onclick="sendMessage()"
          aria-label="Send message"
          disabled
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>

      <!-- Disclaimer -->
      <p class="disclaimer">EduMatch AI uses your profile to give personalised suggestions. Always verify college details on official websites before applying.</p>

    </main>
  </div>

  <!-- ══ TOAST ══════════════════════════════════════════════════════ -->
  <div class="toast-shelf" id="toastShelf" role="status" aria-live="polite"></div>

  <script src="js/chat.js"></script>
</body>
</html>
